{% extends "base.html" %}

{% block title %}Registro - MotoControl Pro{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h1 class="logo">MotoControl <span>Pro</span></h1>
        <h2>Crear Cuenta Nueva</h2>
        
        <form action="#" method="POST">
            <div class="input-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
            </div>

            <div class="input-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo" required placeholder="usuario@correo.com">
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="********">
            </div>
            
            <button type="submit" class="btn-primary">REGISTRARME</button>
        </form>
        
        <p class="register-link">¿Ya tienes cuenta? <a href="{{ url_for('inicio') }}">Inicia sesión aquí</a></p>
    </div>
</div>
{% endblock %}
