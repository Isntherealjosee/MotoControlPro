{% extends "base.html" %}

{% block title %}Iniciar Sesión - MotoControl Pro{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h1 class="logo">MotoControl <span>Pro</span></h1>
        <h2>Iniciar Sesión</h2>
        
        <form action="{{ url_for('inicio') }}" method="POST">
            <div class="input-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo" required placeholder="usuario@correo.com">
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="********">
            </div>
            
            <button type="submit" class="btn-primary">ENTRAR</button>
        </form>
        
        <p class="register-link">¿No tienes cuenta? <a href="{{ url_for('registro') }}">Regístrate aquí</a></p>
    </div>
</div>
{% endblock %}
